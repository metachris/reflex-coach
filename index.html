<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Reflex Coach</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Major+Mono+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --line: #2a2a2a;
      --line-strong: #3a3a3a;
      --text: #f5f5f5;
      --text-dim: #6a6a6a;
      --accent: #d4ff00;
      --accent-dim: #6a8000;
      --danger: #ff3a3a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      overscroll-behavior: none;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse at top, rgba(212, 255, 0, 0.05), transparent 55%),
        repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(255, 255, 255, 0.012) 2px, rgba(255, 255, 255, 0.012) 3px);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app {
      max-width: 540px;
      margin: 0 auto;
      width: 100%;
      padding: 14px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100vh;
      min-height: 100dvh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 2px 2px;
    }

    .brand {
      font-family: 'Major Mono Display', monospace;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
    }

    .brand b {
      color: var(--accent);
      font-weight: normal;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.2s;
    }

    .running .dot {
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 12px var(--accent);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    /* ====== Display panel ====== */
    .display {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 24px 18px 18px;
      position: relative;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 260px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .display::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, transparent 0%, transparent 70%, rgba(212, 255, 0, 0.025) 100%);
      pointer-events: none;
    }

    .progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: var(--accent);
      transition: width 0.06s linear;
      opacity: 0;
    }

    .running .progress {
      opacity: 1;
    }

    .display-label {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
      margin-bottom: 10px;
      text-align: center;
    }

    .tap-hint {
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.4;
      font-weight: 500;
      pointer-events: none;
      z-index: 1;
    }

    .countdown-area {
      padding: 6px 0;
      position: relative;
    }

    .hint {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      font-weight: 500;
      height: 12px;
    }

    .surprise-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
      z-index: 2;
      cursor: pointer;
    }

    .surprise .surprise-img {
      opacity: 1;
      pointer-events: auto;
    }

    .surprise .countdown,
    .surprise .display-label,
    .surprise .hint,
    .surprise .stats,
    .surprise .tap-hint {
      visibility: hidden;
    }

    .surprise .progress {
      opacity: 0 !important;
    }

    .countdown {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(76px, 22vw, 138px);
      line-height: 0.88;
      text-align: center;
      color: var(--text);
      letter-spacing: -0.04em;
      font-weight: normal;
      transition: color 0.15s, text-shadow 0.15s, transform 0.08s;
    }

    .countdown .unit {
      font-size: 0.28em;
      color: var(--text-dim);
      margin-left: 6px;
    }

    .running .countdown {
      color: var(--accent);
      text-shadow: 0 0 30px rgba(212, 255, 0, 0.15);
    }

    .beep-flash .countdown {
      color: #fff !important;
      text-shadow: 0 0 60px var(--accent), 0 0 20px #fff !important;
      transform: scale(1.05);
    }

    .beep-flash .display {
      border-color: var(--accent);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      margin-top: 20px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .stat {
      text-align: center;
      padding: 0 4px;
    }

    .stat+.stat {
      border-left: 1px solid var(--line);
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: 'Major Mono Display', monospace;
      font-size: 20px;
      color: var(--text);
      line-height: 1;
    }

    /* ====== Controls (min/max) ====== */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .control {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 10px 11px;
    }

    .control-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 9px;
      text-align: center;
      font-weight: 500;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .step-btn {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      background: var(--surface-2);
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      color: var(--text);
      font-size: 30px;
      font-weight: 700;
      font-family: 'Oswald', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.08s;
      touch-action: manipulation;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .step-btn:active,
    .step-btn.holding {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      transform: scale(0.94);
    }

    .step-btn:disabled {
      opacity: 0.25;
    }

    .control-value {
      font-family: 'Major Mono Display', monospace;
      font-size: 32px;
      color: var(--text);
      text-align: center;
      line-height: 1;
      flex: 1;
    }

    .control-value .u {
      font-size: 14px;
      color: var(--text-dim);
      margin-left: 2px;
    }

    /* ====== Bias slider ====== */
    .bias-control {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 14px;
    }

    .bias-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
      min-width: 36px;
    }

    .bias-label:last-child {
      text-align: right;
    }

    #bias-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--line-strong);
      border-radius: 2px;
      outline: none;
    }

    #bias-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: var(--text);
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #bias-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: var(--text);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    #bias-slider:active::-webkit-slider-thumb {
      background: var(--accent);
      transform: scale(1.15);
    }

    /* ====== Presets ====== */
    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .preset {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text-dim);
      padding: 11px 4px 9px;
      border-radius: 4px;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      justify-content: center;
      line-height: 1.1;
      transition: all 0.1s;
      min-height: 52px;
    }

    .preset .range {
      font-family: 'Major Mono Display', monospace;
      font-size: 9px;
      letter-spacing: 0;
      color: var(--text-dim);
      opacity: 0.8;
    }

    .preset:active {
      transform: scale(0.96);
    }

    .preset.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .preset.active .range {
      color: var(--bg);
      opacity: 1;
    }

    .preset.multi {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px var(--bg);
    }

    /* ====== Error ====== */
    .error-msg {
      color: var(--danger);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      padding: 8px;
      background: rgba(255, 58, 58, 0.08);
      border: 1px solid rgba(255, 58, 58, 0.3);
      border-radius: 4px;
      display: none;
      font-weight: 700;
    }

    .error-msg.show {
      display: block;
    }

    /* ====== Start button ====== */
    .start-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      height: 84px;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.1s;
      position: relative;
      overflow: hidden;
      padding: 0;
      width: 100%;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 45%);
      pointer-events: none;
    }

    .start-btn::after {
      content: '';
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 8px;
      height: 1px;
      background: rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }

    .start-btn:active {
      transform: scale(0.985);
      filter: brightness(0.92);
    }

    .running .start-btn {
      background: var(--danger);
      color: #fff;
    }

    .start-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Smaller screens */
    @media (max-height: 700px) {
      .display {
        min-height: 200px;
        padding: 18px 14px 14px;
      }

      .countdown {
        font-size: clamp(64px, 20vw, 110px);
      }

      .start-btn {
        height: 72px;
        font-size: 22px;
      }

      .step-btn {
        width: 50px;
        height: 50px;
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <header>
      <div class="brand">reflex<b>:</b>coach</div>
      <div class="status" id="status">
        <span class="dot"></span>
        <span id="status-text">Ready</span>
      </div>
    </header>

    <div class="display" id="display">
      <div class="progress" id="progress"></div>
      <img class="surprise-img" id="surprise-img" src="https://www.panthersfightschool.at/wp-content/uploads/2025/02/IMG_2843-scaled-e1738507496595-600x600.jpeg" alt="" loading="lazy" referrerpolicy="no-referrer">
      <div class="countdown-area" id="countdown-area">
        <div class="display-label" id="display-label">Tap Start</div>
        <div class="countdown" id="countdown">00<span class="unit">s</span></div>
        <div class="hint" id="surprise-hint">Tap to hide</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Beeps</div>
          <div class="stat-value" id="beep-count">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Elapsed</div>
          <div class="stat-value" id="elapsed">0:00</div>
        </div>
        <div class="stat">
          <div class="stat-label">Last</div>
          <div class="stat-value" id="last-interval">—</div>
        </div>
      </div>
      <div class="tap-hint">Tap to hide</div>
    </div>

    <div class="controls">
      <div class="control">
        <div class="control-label">Min Interval</div>
        <div class="control-row">
          <button class="step-btn" data-action="min-down" aria-label="Decrease minimum">−</button>
          <div class="control-value"><span id="min-val">2</span><span class="u">s</span></div>
          <button class="step-btn" data-action="min-up" aria-label="Increase minimum">+</button>
        </div>
      </div>
      <div class="control">
        <div class="control-label">Max Interval</div>
        <div class="control-row">
          <button class="step-btn" data-action="max-down" aria-label="Decrease maximum">−</button>
          <div class="control-value"><span id="max-val">8</span><span class="u">s</span></div>
          <button class="step-btn" data-action="max-up" aria-label="Increase maximum">+</button>
        </div>
      </div>
    </div>

    <div class="bias-control">
      <span class="bias-label">Short</span>
      <input type="range" id="bias-slider" min="-1" max="1" step="0.1" value="0">
      <span class="bias-label">Long</span>
    </div>

    <div class="presets" id="sound-presets">
      <button class="preset active" data-sound="clap">Clap</button>
      <button class="preset" data-sound="beep">Beep</button>
      <button class="preset" data-sound="whistle">Whistle</button>
      <button class="preset" data-sound="horn">Horn</button>
    </div>

    <div class="error-msg" id="error-msg">Min must be ≤ Max</div>

    <button class="start-btn" id="start-btn">Start</button>
  </div>

  <script>
    (() => {
      // ====== State ======
      let minInterval = 2;
      let maxInterval = 8;
      let running = false;
      let beepCount = 0;
      let startTime = 0;
      let nextBeepAt = 0;
      let currentInterval = 0;
      let lastInterval = 0;
      let intervalStart = 0;
      let timeoutId = null;
      let rafId = null;
      let elapsedTimer = null;
      let audioCtx = null;
      let wakeLock = null;
      let surprise = false;
      let selectedSounds = ['clap'];
      let intervalBias = 0; // -1 = short bias, 0 = neutral, 1 = long bias

      // ====== DOM ======
      const app = document.getElementById('app');
      const countdownEl = document.getElementById('countdown');
      const countdownAreaEl = document.getElementById('countdown-area');
      const surpriseImg = document.getElementById('surprise-img');
      const displayLabelEl = document.getElementById('display-label');
      const startBtn = document.getElementById('start-btn');
      const minValEl = document.getElementById('min-val');
      const maxValEl = document.getElementById('max-val');
      const beepCountEl = document.getElementById('beep-count');
      const elapsedEl = document.getElementById('elapsed');
      const lastIntervalEl = document.getElementById('last-interval');
      const statusTextEl = document.getElementById('status-text');
      const errorMsg = document.getElementById('error-msg');
      const progressEl = document.getElementById('progress');

      // ====== Persistent storage ======
      const ALL_SOUNDS = ['clap', 'beep', 'whistle', 'horn'];

      function getSettingsJSON() {
        return JSON.stringify({ min: minInterval, max: maxInterval, surprise, sounds: selectedSounds, bias: intervalBias });
      }

      function applyParsedSettings(s) {
        if (typeof s.min === 'number' && s.min >= 1 && s.min <= 999) minInterval = s.min;
        if (typeof s.max === 'number' && s.max >= 1 && s.max <= 999) maxInterval = s.max;
        if (typeof s.surprise === 'boolean') surprise = s.surprise;
        // Support legacy single sound setting
        if (typeof s.sound === 'string' && ALL_SOUNDS.includes(s.sound)) selectedSounds = [s.sound];
        // New multi-sound setting
        if (Array.isArray(s.sounds) && s.sounds.length > 0) {
          const valid = s.sounds.filter(x => ALL_SOUNDS.includes(x));
          if (valid.length > 0) selectedSounds = valid;
        }
        if (typeof s.bias === 'number' && s.bias >= -1 && s.bias <= 1) intervalBias = s.bias;
      }

      async function loadSettings() {
        try {
          if (window.storage) {
            const res = await window.storage.get('settings');
            if (res && res.value) applyParsedSettings(JSON.parse(res.value));
          } else {
            const raw = localStorage.getItem('interval-trainer-settings');
            if (raw) applyParsedSettings(JSON.parse(raw));
          }
        } catch (e) {
          // First run / no saved settings
        }
        app.classList.toggle('surprise', surprise);
        updateValues();
        updateSoundButtons();
        updateBiasSlider();
      }

      async function saveSettings() {
        const json = getSettingsJSON();
        try {
          if (window.storage) await window.storage.set('settings', json);
          else localStorage.setItem('interval-trainer-settings', json);
        } catch (e) { /* ignore */ }
      }

      // ====== Audio ======
      function initAudio() {
        if (!audioCtx) {
          try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          } catch (e) { return; }
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      // White noise buffer — generated once, reused per clap
      let noiseBuffer = null;
      function getNoiseBuffer() {
        if (noiseBuffer) return noiseBuffer;
        const sr = audioCtx.sampleRate;
        noiseBuffer = audioCtx.createBuffer(1, sr * 0.3, sr);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        return noiseBuffer;
      }

      function beep() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;

        // Bandpass filter — sculpts white noise into the "smack" frequency range of a clap
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1400;
        filter.Q.value = 1.2;

        // High-pass to remove low rumble
        const hpf = audioCtx.createBiquadFilter();
        hpf.type = 'highpass';
        hpf.frequency.value = 500;

        filter.connect(hpf);

        // Master envelope — classic clap shape: 3 quick micro-transients + 1 longer tail
        // Mimics the natural spread of hands not meeting in a single instant
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0, now);

        // Hit 1
        env.gain.linearRampToValueAtTime(0.9, now + 0.001);
        env.gain.exponentialRampToValueAtTime(0.01, now + 0.012);
        // Hit 2
        env.gain.linearRampToValueAtTime(0.85, now + 0.014);
        env.gain.exponentialRampToValueAtTime(0.01, now + 0.026);
        // Hit 3
        env.gain.linearRampToValueAtTime(0.8, now + 0.028);
        env.gain.exponentialRampToValueAtTime(0.01, now + 0.040);
        // Hit 4 (the "real" clap) — louder, with a decay tail for body
        env.gain.linearRampToValueAtTime(1.0, now + 0.042);
        env.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

        hpf.connect(env);
        env.connect(audioCtx.destination);

        // Noise source feeds everything
        const noise = audioCtx.createBufferSource();
        noise.buffer = getNoiseBuffer();
        noise.connect(filter);

        const dur = 0.2;
        noise.start(now);
        noise.stop(now + dur);

        if (navigator.vibrate) navigator.vibrate(40);
      }

      function beepTone() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 880;
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(0.8, now + 0.005);
        env.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
        osc.connect(env);
        env.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
        if (navigator.vibrate) navigator.vibrate(40);
      }

      function whistle() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const dur = 0.25;
        // Primary tone
        const osc1 = audioCtx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(2800, now);
        osc1.frequency.linearRampToValueAtTime(3200, now + 0.03);
        osc1.frequency.setValueAtTime(3200, now + 0.15);
        osc1.frequency.linearRampToValueAtTime(2800, now + dur);
        // Second harmonic for piercing edge
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(5600, now);
        osc2.frequency.linearRampToValueAtTime(6400, now + 0.03);
        osc2.frequency.setValueAtTime(6400, now + 0.15);
        osc2.frequency.linearRampToValueAtTime(5600, now + dur);
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(0.7, now + 0.005);
        env.gain.setValueAtTime(0.7, now + 0.15);
        env.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        const env2 = audioCtx.createGain();
        env2.gain.setValueAtTime(0, now);
        env2.gain.linearRampToValueAtTime(0.15, now + 0.005);
        env2.gain.setValueAtTime(0.15, now + 0.15);
        env2.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        osc1.connect(env);
        osc2.connect(env2);
        env.connect(audioCtx.destination);
        env2.connect(audioCtx.destination);
        osc1.start(now);
        osc1.stop(now + dur);
        osc2.start(now);
        osc2.stop(now + dur);
        if (navigator.vibrate) navigator.vibrate(40);
      }

      function horn() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = 220;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        filter.Q.value = 2;
        const env = audioCtx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(0.6, now + 0.01);
        env.gain.setValueAtTime(0.6, now + 0.2);
        env.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
        osc.connect(filter);
        filter.connect(env);
        env.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.35);
        if (navigator.vibrate) navigator.vibrate(40);
      }

      function playSound(specificSound) {
        const sound = specificSound || selectedSounds[Math.floor(Math.random() * selectedSounds.length)];
        switch (sound) {
          case 'beep': beepTone(); break;
          case 'whistle': whistle(); break;
          case 'horn': horn(); break;
          default: beep(); break;
        }
      }

      // ====== Wake lock ======
      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
          }
        } catch (e) { /* ignore */ }
      }

      async function releaseWakeLock() {
        if (wakeLock) {
          try { await wakeLock.release(); } catch (e) { }
          wakeLock = null;
        }
      }

      document.addEventListener('visibilitychange', () => {
        if (running && document.visibilityState === 'visible' && !wakeLock) {
          requestWakeLock();
        }
      });

      // ====== Settings UI ======
      function updateValues() {
        minValEl.textContent = minInterval;
        maxValEl.textContent = maxInterval;
        validateRange();
      }

      function validateRange() {
        const valid = minInterval <= maxInterval && minInterval >= 1;
        errorMsg.classList.toggle('show', !valid);
        if (!running) {
          startBtn.disabled = !valid;
        }
        return valid;
      }

      function adjust(action) {
        if (action === 'min-down' && minInterval > 1) minInterval--;
        else if (action === 'min-up' && minInterval < 999) minInterval++;
        else if (action === 'max-down' && maxInterval > 1) maxInterval--;
        else if (action === 'max-up' && maxInterval < 999) maxInterval++;
        else return;
        updateValues();
        saveSettings();
      }

      // Step buttons: tap fires on pointerup, long-press triggers timer-based repeat
      document.querySelectorAll('.step-btn').forEach(btn => {
        const action = btn.dataset.action;
        let holdTimer = null;
        let repeatTimer = null;
        let didLongPress = false;
        let pressed = false;

        const cleanup = () => {
          clearTimeout(holdTimer);
          clearInterval(repeatTimer);
          holdTimer = null;
          repeatTimer = null;
          btn.classList.remove('holding');
          pressed = false;
        };

        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          if (pressed) return;
          pressed = true;
          didLongPress = false;
          btn.classList.add('holding');
          try { btn.setPointerCapture(e.pointerId); } catch (_) { }

          holdTimer = setTimeout(() => {
            didLongPress = true;
            adjust(action);                  // first repeat tick
            repeatTimer = setInterval(() => adjust(action), 75);
          }, 380);
        });

        btn.addEventListener('pointerup', () => {
          if (!pressed) return;
          const wasTap = !didLongPress;
          cleanup();
          if (wasTap) adjust(action);        // single-tap action
        });

        btn.addEventListener('pointercancel', cleanup);
        btn.addEventListener('lostpointercapture', () => { if (pressed) cleanup(); });
      });

      // ====== Timer loop ======
      function scheduleNext() {
        // Apply bias: negative = short bias, positive = long bias
        const factor = Math.pow(3, -intervalBias);
        const biasedRandom = Math.pow(Math.random(), factor);
        currentInterval = biasedRandom * (maxInterval - minInterval) + minInterval;
        intervalStart = performance.now();
        nextBeepAt = intervalStart + currentInterval * 1000;
        timeoutId = setTimeout(() => {
          if (!running) return;
          playSound();
          beepCount++;
          lastInterval = currentInterval;
          beepCountEl.textContent = beepCount;
          lastIntervalEl.textContent = lastInterval.toFixed(1) + 's';
          app.classList.add('beep-flash');
          setTimeout(() => app.classList.remove('beep-flash'), 120);
          scheduleNext();
        }, currentInterval * 1000);
      }

      function tick() {
        if (!running) return;
        const now = performance.now();
        const remaining = Math.max(0, (nextBeepAt - now) / 1000);
        const fmt = remaining.toFixed(1).padStart(4, '0');
        countdownEl.innerHTML = fmt + '<span class="unit">s</span>';

        const pct = Math.min(100, ((now - intervalStart) / (currentInterval * 1000)) * 100);
        progressEl.style.width = pct + '%';

        rafId = requestAnimationFrame(tick);
      }

      function updateElapsed() {
        if (!running) return;
        const elapsed = Math.floor((performance.now() - startTime) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        elapsedEl.textContent = m + ':' + s.toString().padStart(2, '0');
      }

      function start() {
        if (!validateRange()) return;
        initAudio();
        requestWakeLock();
        running = true;
        beepCount = 0;
        lastInterval = 0;
        startTime = performance.now();
        beepCountEl.textContent = '0';
        lastIntervalEl.textContent = '—';
        elapsedEl.textContent = '0:00';
        app.classList.add('running');
        startBtn.textContent = 'Stop';
        displayLabelEl.textContent = 'Next Beep In';
        statusTextEl.textContent = 'Running';
        scheduleNext();
        rafId = requestAnimationFrame(tick);
        elapsedTimer = setInterval(updateElapsed, 250);
      }

      function stop() {
        running = false;
        clearTimeout(timeoutId);
        cancelAnimationFrame(rafId);
        clearInterval(elapsedTimer);
        releaseWakeLock();
        app.classList.remove('running');
        startBtn.textContent = 'Start';
        displayLabelEl.textContent = 'Tap Start';
        countdownEl.innerHTML = '00<span class="unit">s</span>';
        statusTextEl.textContent = 'Ready';
        progressEl.style.width = '0%';
      }

      startBtn.addEventListener('click', () => {
        if (running) stop();
        else start();
      });

      // Tap anywhere in the display panel or the image to toggle surprise mode
      const displayEl = document.getElementById('display');
      const toggleSurprise = () => {
        surprise = !surprise;
        app.classList.toggle('surprise', surprise);
        saveSettings();
      };
      displayEl.addEventListener('click', toggleSurprise);

      // ====== Bias slider ======
      const biasSlider = document.getElementById('bias-slider');

      function updateBiasSlider() {
        biasSlider.value = intervalBias;
      }

      biasSlider.addEventListener('input', () => {
        intervalBias = parseFloat(biasSlider.value);
        saveSettings();
      });

      // ====== Sound presets ======
      function updateSoundButtons() {
        const isMulti = selectedSounds.length > 1;
        document.querySelectorAll('#sound-presets .preset').forEach(btn => {
          const isSelected = selectedSounds.includes(btn.dataset.sound);
          btn.classList.toggle('active', isSelected);
          btn.classList.toggle('multi', isMulti && isSelected);
        });
      }

      document.querySelectorAll('#sound-presets .preset').forEach(btn => {
        const sound = btn.dataset.sound;
        let holdTimer = null;
        let didLongPress = false;
        let pressed = false;

        const cleanup = () => {
          clearTimeout(holdTimer);
          holdTimer = null;
          pressed = false;
        };

        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          if (pressed) return;
          pressed = true;
          didLongPress = false;
          try { btn.setPointerCapture(e.pointerId); } catch (_) { }

          holdTimer = setTimeout(() => {
            didLongPress = true;
            initAudio();
            // Long-press: toggle this sound in multi-select
            const idx = selectedSounds.indexOf(sound);
            if (idx >= 0 && selectedSounds.length > 1) {
              selectedSounds.splice(idx, 1);
            } else if (idx < 0) {
              selectedSounds.push(sound);
            }
            updateSoundButtons();
            saveSettings();
            playSound(sound);
          }, 400);
        });

        btn.addEventListener('pointerup', () => {
          if (!pressed) return;
          const wasTap = !didLongPress;
          cleanup();
          if (wasTap) {
            initAudio();
            // Tap: single-select this sound
            selectedSounds = [sound];
            updateSoundButtons();
            saveSettings();
            playSound(sound);
          }
        });

        btn.addEventListener('pointercancel', cleanup);
        btn.addEventListener('lostpointercapture', () => { if (pressed) cleanup(); });
      });

      // ====== Keyboard ======
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          e.preventDefault();
          if (running) stop();
          else start();
        }
      });

      // Init
      loadSettings();
    })();
  </script>
  <script>
    // Register service worker so the app is installable on Android
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { });
      });
    }
  </script>
